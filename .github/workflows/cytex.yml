
name: Cytex Scan

# Cytex security scan: SBOM, dependency CVEs, static analysis, and AI bill-of-materials.
on:
  push:
    branches:
      - "master"
      - "main"
  workflow_dispatch:
    inputs:
      changedFiles:
        description: "Comma-separated changed files for incremental scan (empty = full scan)"
        required: false
        default: ""

jobs:
  scan:
    name: Cytex security scan
    runs-on: ubuntu-latest
    env:
      REPORT_DIR: /tmp/cytex-reports
      AIBOM_VERSION: 1.0.0rc2
      AIBOM_CATALOG_SHA256: b1165384a646094aa6a4762d676f285c1c68b6d7f9367c90a129b529904a3268
      AIBOM_LLM_PROVIDER: groq
      AIBOM_LLM_MODEL: openai/gpt-oss-120b
      AIBOM_FAST_MODEL: openai/gpt-oss-20b
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install scan toolchain
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          python3 -m pip install --quiet --pre "cisco-aibom[all]==$AIBOM_VERSION" langchain-groq
          # semgrep and mcp-scanner run from isolated pipx environments.
          pipx install --force semgrep
          pipx install --force cisco-ai-mcp-scanner
          mkdir -p ~/.aibom/catalogs
          curl -sSfL -o ~/.aibom/catalogs/aibom_catalog-$AIBOM_VERSION.duckdb https://github.com/cisco-ai-defense/aibom/releases/download/$AIBOM_VERSION/aibom_catalog-$AIBOM_VERSION.duckdb
          echo "$AIBOM_CATALOG_SHA256  $HOME/.aibom/catalogs/aibom_catalog-$AIBOM_VERSION.duckdb" | sha256sum -c -

      - name: Resolve scan scope
        env:
          CHANGED_FILES: ${{ github.event.inputs.changedFiles }}
        run: |
          mkdir -p "$REPORT_DIR"
          SCAN_TYPE=full
          SCAN_DIR=.
          CHANGED_FILE_COUNT=0
          if [ -n "$CHANGED_FILES" ]; then
            SCAN_TYPE=incremental
            SCAN_DIR=$(mktemp -d)
            IFS=',' read -ra CHANGED <<< "$CHANGED_FILES"
            for path in "${CHANGED[@]}"; do
              if [ -f "$path" ]; then
                mkdir -p "$SCAN_DIR/$(dirname "$path")"
                cp "$path" "$SCAN_DIR/$path"
              fi
            done
            CHANGED_FILE_COUNT=$(find "$SCAN_DIR" -type f | wc -l)
            echo "Incremental scan: $CHANGED_FILE_COUNT of ${#CHANGED[@]} changed path(s) still exist"
          fi
          {
            echo "SCAN_TYPE=$SCAN_TYPE"
            echo "SCAN_DIR=$SCAN_DIR"
            echo "CHANGED_FILE_COUNT=$CHANGED_FILE_COUNT"
          } >> "$GITHUB_ENV"

      # set +e on each scanner so one failure doesn't abort the rest.
      - name: Generate SBOM (Syft)
        run: |
          set +e
          syft "dir:$SCAN_DIR" -o cyclonedx-json > "$REPORT_DIR/sbom.cdx.json"
          echo "SYFT_STATUS=$?" >> "$GITHUB_ENV"

      - name: Scan dependencies for vulnerabilities (Grype)
        run: |
          set +e
          grype "dir:$SCAN_DIR" -o json -o cyclonedx-json="$REPORT_DIR/grype.cdx.json"
          echo "GRYPE_STATUS=$?" >> "$GITHUB_ENV"

      - name: Static analysis (Semgrep)
        run: |
          set +e
          semgrep --config=auto "$SCAN_DIR" --json | tee "$REPORT_DIR/semgrep.json"
          echo "SEMGREP_STATUS=${PIPESTATUS[0]}" >> "$GITHUB_ENV"

      # timeout bounds the enrichment pass; console output (incl. compliance) is teed for the report.
      - name: Generate AIBOM (Cisco AIBOM)
        env:
          AIBOM_LLM_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          set +e
          timeout 600 cisco-aibom analyze "$SCAN_DIR" \
            -o cyclonedx -O "$REPORT_DIR/aibom.cdx.json" \
            --llm-model "$AIBOM_LLM_MODEL" \
            --llm-provider "$AIBOM_LLM_PROVIDER" \
            --llm-api-key "$AIBOM_LLM_API_KEY" \
            --agentic-fast-model "$AIBOM_FAST_MODEL" \
            --severity info \
            --agentic-batch-size 3 \
            --agentic-concurrency 1 \
            --agentic-timeout 120 \
            --compliance all \
            --timing \
            --validate \
            --show-summary 2>&1 | tee "$REPORT_DIR/aibom_console.txt"
          echo "AIBOM_STATUS=${PIPESTATUS[0]}" >> "$GITHUB_ENV"

      - name: Scan agent skills (skill-scanner)
        run: |
          set +e
          skill-scanner scan-all "$SCAN_DIR" --recursive --lenient --format json --output-json "$REPORT_DIR/skills.json"
          echo "SKILLS_STATUS=$?" >> "$GITHUB_ENV"

      - name: Scan MCP servers (mcp-scanner)
        run: |
          set +e
          # mcp-scanner from its isolated pipx environment.
          VENVS=$(pipx environment --value PIPX_LOCAL_VENVS 2>/dev/null)
          MCP_BIN="$VENVS/cisco-ai-mcp-scanner/bin/mcp-scanner"
          [ -x "$MCP_BIN" ] || MCP_BIN=mcp-scanner
          # First MCP config found anywhere under the scan dir.
          MCP_CFG=""
          for n in mcp.json .mcp.json mcp_config.json claude_desktop_config.json cline_mcp_settings.json; do
            MCP_CFG=$(find "$SCAN_DIR" -type f -name "$n" -not -path '*/node_modules/*' -not -path '*/.git/*' 2>/dev/null | head -n1)
            [ -n "$MCP_CFG" ] && break
          done
          if [ -n "$MCP_CFG" ]; then
            echo "Scanning MCP config: $MCP_CFG with $MCP_BIN"
            "$MCP_BIN" --analyzers yara --format raw config --config-path "$MCP_CFG" > "$REPORT_DIR/mcp.json"
            echo "MCP_STATUS=$?" >> "$GITHUB_ENV"
          else
            echo "No MCP config found under $SCAN_DIR -- skipping mcp-scanner"
            echo "MCP_STATUS=skipped" >> "$GITHUB_ENV"
          fi

      # Merge all scanner outputs into one CycloneDX report; each item tagged with its _source.
      - name: Consolidate scan report
        if: always()
        env:
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          mkdir -p "$REPORT_DIR"
          export SCAN_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          export SCAN_PREFIX=$(realpath "${SCAN_DIR:-.}")
          export WORKSPACE=$(pwd)
          python3 - <<'PYEOF'
          import json
          import os

          report_dir = os.environ["REPORT_DIR"]

          def load(name):
              path = os.path.join(report_dir, name)
              if not os.path.exists(path):
                  return {}
              try:
                  with open(path) as fh:
                      return json.load(fh)
              except (ValueError, OSError):
                  return {}

          sbom = load("sbom.cdx.json")
          aibom = load("aibom.cdx.json")
          grype = load("grype.cdx.json")
          semgrep = load("semgrep.json")

          # Make file references repo-relative by stripping absolute runner paths.
          prefixes = sorted(
              {p.rstrip("/") + "/" for p in (os.environ.get("SCAN_PREFIX", ""), os.environ.get("WORKSPACE", "")) if p and p != "/"},
              key=len, reverse=True,
          )

          def norm(value):
              if isinstance(value, str):
                  for prefix in prefixes:
                      value = value.replace(prefix, "")
                  return value
              if isinstance(value, list):
                  return [norm(item) for item in value]
              if isinstance(value, dict):
                  return {key: norm(item) for key, item in value.items()}
              return value

          def tools_of(doc):
              tools = (doc.get("metadata") or {}).get("tools")
              if isinstance(tools, dict):
                  return [t for t in tools.get("components") or [] if isinstance(t, dict)]
              if isinstance(tools, list):
                  return [t for t in tools if isinstance(t, dict)]
              return []

          def tag(items, source):
              return [dict(item, _source=source) for item in items]

          combined = dict(aibom) if aibom else {"bomFormat": "CycloneDX", "specVersion": "1.5", "components": [], "metadata": {}}
          tools = tools_of(sbom)
          for extra in tools_of(aibom) + tools_of(grype):
              if extra not in tools:
                  tools.append(extra)
          combined.setdefault("metadata", {})["tools"] = tools
          for key in ("components", "dependencies", "vulnerabilities"):
              merged = tag(sbom.get(key) or [], "sbom") + tag(aibom.get(key) or [], "aibom")
              if key == "vulnerabilities":
                  merged += tag(grype.get(key) or [], "grype")
              if merged:
                  combined[key] = merged

          # CVE enrichment: aibom also nests OSV vulnerabilities under each component; hoist
          # them to top-level vulnerabilities[] (_source "aibom") so they sit beside Grype's.
          for comp in aibom.get("components") or []:
              for cve in comp.get("vulnerabilities") or []:
                  combined.setdefault("vulnerabilities", []).append(dict(cve, _source="aibom"))

          # Skills merge like every other detector: inventory -> components[], findings ->
          # vulnerabilities[], tagged _source "skills". All severities kept.
          skills_doc = load("skills.json")
          skill_results = norm(skills_doc.get("results") or [])
          for result in skill_results:
              name = str(result.get("skill_name", ""))
              ref = "agent-skill-" + name.replace(" ", "-")
              combined.setdefault("components", []).append({
                  "type": "skill",
                  "bom-ref": ref,
                  "name": name,
                  "version": "",
                  "_source": "skills",
                  "properties": [
                      {"name": "skill:Path", "value": str(result.get("skill_path", ""))},
                      {"name": "skill:IsSafe", "value": str(result.get("is_safe", ""))},
                      {"name": "skill:MaxSeverity", "value": str(result.get("max_severity", ""))},
                      {"name": "skill:FindingsCount", "value": str(result.get("findings_count", ""))},
                  ],
              })
              for finding in result.get("findings") or []:
                  combined.setdefault("vulnerabilities", []).append({
                      "bom-ref": str(finding.get("id") or finding.get("rule_id", "SKILL-FINDING")) + "-" + ref,
                      "id": finding.get("rule_id", "SKILL-FINDING"),
                      "source": {"name": "skill-scanner"},
                      "ratings": [{"severity": str(finding.get("severity", "")).lower(), "method": "other"}],
                      "description": "%s: %s Remediation: %s" % (
                          finding.get("title", ""), finding.get("description", ""),
                          finding.get("remediation", "")),
                      "affects": [{"ref": ref}],
                      "properties": [
                          {"name": "skill:Category", "value": str(finding.get("category", ""))},
                          {"name": "skill:Analyzer", "value": str(finding.get("analyzer", ""))},
                          {"name": "skill:File", "value": str(finding.get("file_path", ""))},
                      ],
                      "_source": "skills",
                  })

          # MCP findings -> vulnerabilities[] (_source "mcp"). mcp-scanner's raw shape isn't
          # fixed, so locate findings defensively and keep the whole finding in a property.
          mcp_doc = load("mcp.json")
          if isinstance(mcp_doc, list):
              mcp_findings = mcp_doc
          elif isinstance(mcp_doc, dict):
              mcp_findings = (mcp_doc.get("findings") or mcp_doc.get("results")
                              or mcp_doc.get("threats") or mcp_doc.get("vulnerabilities") or [])
          else:
              mcp_findings = []
          for i, f in enumerate(norm(mcp_findings)):
              f = f if isinstance(f, dict) else {"description": str(f)}
              sev = str(f.get("severity") or f.get("level") or "unknown").lower()
              title = str(f.get("threat") or f.get("name") or f.get("title") or "MCP-FINDING")
              combined.setdefault("vulnerabilities", []).append({
                  "bom-ref": "mcp-finding-%d" % i,
                  "id": str(f.get("rule_id") or f.get("id") or title),
                  "source": {"name": "mcp-scanner"},
                  "ratings": [{"severity": sev, "method": "other"}],
                  "description": str(f.get("description") or title),
                  "properties": [{"name": "mcp:Raw", "value": json.dumps(f)[:2000]}],
                  "_source": "mcp",
              })

          # Compliance verdicts print to the console, so parse the tables from
          # aibom_console.txt. Rows look like:  eu-1 | Model transparency | pass | detail
          import re as _re
          compliance = {}
          try:
              with open(os.path.join(report_dir, "aibom_console.txt"), encoding="utf-8", errors="replace") as fh:
                  console = fh.read()
          except OSError:
              console = ""
          current = None
          for line in console.splitlines():
              header = _re.search(r"Compliance\s+[—-]\s+([A-Z_]+)", line)
              if header:
                  current = header.group(1)
                  compliance[current] = []
                  continue
              if current:
                  row = _re.search(r"\b([a-z]+-\d+)\b.*?\b(pass|fail|not_applicable)\b", line)
                  if row:
                      compliance[current].append({"id": row.group(1), "status": row.group(2)})
          compliance = {k: v for k, v in compliance.items() if v}

          findings = semgrep.get("results") or []
          severity_counts = {}
          for vuln in combined.get("vulnerabilities") or []:
              ratings = vuln.get("ratings") or [{}]
              severity = str(ratings[0].get("severity", "unknown")).lower()
              severity_counts[severity] = severity_counts.get(severity, 0) + 1
          sast_counts = {}
          for finding in findings:
              severity = str((finding.get("extra") or {}).get("severity", "unknown")).lower()
              sast_counts[severity] = sast_counts.get(severity, 0) + 1

          combined["semgrep"] = {"results": findings, "severityCounts": sast_counts}
          combined["compliance"] = compliance
          combined["cytexScan"] = {
              "scanType": os.environ.get("SCAN_TYPE", "full"),
              "repository": os.environ.get("REPO", ""),
              "branch": os.environ.get("BRANCH", ""),
              "commitSha": os.environ.get("COMMIT_SHA", ""),
              "runId": os.environ.get("RUN_ID", ""),
              "runAttempt": os.environ.get("RUN_ATTEMPT", ""),
              "trigger": os.environ.get("EVENT_NAME", ""),
              "timestampUtc": os.environ.get("SCAN_TIMESTAMP", ""),
              "changedFileCount": int(os.environ.get("CHANGED_FILE_COUNT", "0") or 0),
              "toolStatus": {
                  "syft": os.environ.get("SYFT_STATUS", ""),
                  "grype": os.environ.get("GRYPE_STATUS", ""),
                  "semgrep": os.environ.get("SEMGREP_STATUS", ""),
                  "aibom": os.environ.get("AIBOM_STATUS", ""),
                  "skills": os.environ.get("SKILLS_STATUS", ""),
                  "mcp": os.environ.get("MCP_STATUS", ""),
              },
              "summary": {
                  "components": len(combined.get("components") or []),
                  "skillComponents": len([c for c in combined.get("components") or []
                                          if isinstance(c, dict) and c.get("_source") == "skills"]),
                  "skillFindings": len([v for v in combined.get("vulnerabilities") or []
                                        if isinstance(v, dict) and v.get("_source") == "skills"]),
                  "mcpFindings": len([v for v in combined.get("vulnerabilities") or []
                                      if isinstance(v, dict) and v.get("_source") == "mcp"]),
                  "dependencies": len(combined.get("dependencies") or []),
                  "vulnerabilities": len(combined.get("vulnerabilities") or []),
                  "sastFindings": len(findings),
                  "complianceFrameworks": len(compliance),
                  "complianceFailures": sum(1 for rows in compliance.values()
                                            for row in rows if row.get("status") == "fail"),
                  "severityCounts": severity_counts,
                  "sastSeverityCounts": sast_counts,
              },
              "artifacts": {
                  "report": "cytex-scan-report.json",
                  "sources": ["sbom.cdx.json", "aibom.cdx.json", "aibom_console.txt", "grype.cdx.json",
                              "semgrep.json", "skills.json", "mcp.json"],
              },
          }

          combined = norm(combined)
          with open(os.path.join(report_dir, "cytex-scan-report.json"), "w") as fh:
              json.dump(combined, fh, indent=2, sort_keys=True)
          print("Consolidated report: components=%d vulnerabilities=%d sast=%d" % (
              len(combined.get("components") or []),
              len(combined.get("vulnerabilities") or []),
              len(findings)))
          PYEOF

      # Upload only the consolidated report; intermediate files stay out of the artifact.
      - name: Upload consolidated report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cytex-scan-report
          path: ${{ env.REPORT_DIR }}/cytex-scan-report.json
